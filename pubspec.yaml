name: safelanka
description: "SafeLanka - Disaster Safety & Emergency Assistance Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  font_awesome_flutter: ^11.0.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.0.0
  google_sign_in: ^7.2.0
  geolocator: ^14.0.3
  url_launcher: ^6.3.2
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  share_plus: ^13.2.0
  google_generative_ai: ^0.4.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2
  intl: ^0.19.0
  logger: ^2.7.0
  image_picker: ^1.1.2
  avatar_glow: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/guides/
    - assets/images/
